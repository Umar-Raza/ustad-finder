workflows:
  flutter-android-workflow:
    name: Flutter Android Workflow
    environment:
      flutter: stable
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build Android APK
        script: flutter build apk --release --dart-define=OPENAI_KEY=$OPENAI_KEY
      - name: Build Android App Bundle
        script: flutter build appbundle --release --dart-define=OPENAI_KEY=$OPENAI_KEY
    artifacts:
      - build/app/outputs/flutter-apk/**/*.apk
      - build/app/outputs/bundle/**/*.aab
