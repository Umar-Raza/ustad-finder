workflows:
  android-release:
    name: Android Release Workflow
    environment:
      flutter: stable
      groups:
        - keys
    scripts:
      - name: Generate config.dart
        script: |
          echo "const String openAiApiKey = '${OPENAI_KEY}';" > lib/config.dart
          echo "const String geminiApiKey = '${GEMINI_KEY}';" >> lib/config.dart
      - name: Get packages
        script: flutter pub get
      - name: Build Android Release APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
