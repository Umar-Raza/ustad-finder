workflows:
  android-debug:
    name: Android Debug Workflow
    environment:
      flutter: stable
    scripts:
      - name: Generate config.dart
        script: |
          echo "const String openAiApiKey = '${OPENAI_KEY}';" > lib/config.dart
          echo "const String geminiApiKey = '${GEMINI_KEY}';" >> lib/config.dart
      - name: Get packages
        script: flutter pub get
      - name: Build Android Debug APK
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
